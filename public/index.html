<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLARIX | Solar Unix Calendar</title>
  <meta name="description" content="A beautiful and functional Solar Unix Calendar with 13 months of 28 days and a transition leap period. Modern celestial aesthetic.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="canonical" href="https://solarunixcalendar.web.app/">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://solarunixcalendar.web.app/">
  <meta property="og:title" content="SOLARIX | Solar Unix Calendar">
  <meta property="og:description" content="Explore the eternal Solar Unix Calendar. 13 months, 28 days, and planetary orbital navigation. High-precision astronomical time.">
  <meta property="og:image" content="https://solarunixcalendar.web.app/celestial_galaxy_nebula.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://solarunixcalendar.web.app/">
  <meta property="twitter:title" content="SOLARIX | Solar Unix Calendar">
  <meta property="twitter:description" content="An eternal calendar based on Unix epoch with astronomical navigation. Minimalist and modern.">
  <meta property="twitter:image" content="https://solarunixcalendar.web.app/celestial_galaxy_nebula.png">

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
  <div class="app-wrapper">
    <section class="solar-side">
      <div class="solar-header" style="margin-top: 25px;">
        <p style="color: white;">Keep it simple, keep it forever...</p>
      </div>
      <canvas id="solar-system-bg"></canvas>
    </section>
    
    <section class="calendar-side">
      <main class="calendar-container">
        <header>
          <div class="month-info">
            <h1 id="month-name">Loading...</h1>
            <div class="clocks-container">
              <p id="slx-clock" class="clock-display slx-color"></p>
              <p id="gregorian-clock" class="clock-display greg-color"></p>
            </div>
          </div>

          <div class="nav-controls">
            <button id="prev-btn" class="nav-btn" aria-label="Previous Month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <button id="next-btn" class="nav-btn" aria-label="Next Month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </header>
        
        <div id="calendar-grid" class="calendar-grid">
          <!-- Generated by app.js -->
        </div>

        <footer id="leap-timeline" class="leap-timeline"></footer>
      </main>
    </section>
  </div>

  <script src="app.js"></script>
  <script src="background.js"></script>
</body>
</html>
